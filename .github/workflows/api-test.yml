name: API Automation Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Test Environment'
        required: true
        default: 'test'
        type: choice
        options:
          - dev
          - test
          - prod
      test_module:
        description: 'Test Module (empty for all)'
        required: false
        default: ''
        type: string

jobs:
  api-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure
        run: |
          sudo apt-add-repository -y ppa:qameta/allure
          sudo apt-get update
          sudo apt-get install -y allure

      - name: Run API Tests
        env:
          TEST_ENV: ${{ github.event.inputs.test_env || 'test' }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.test_module }}" ]; then
            pytest testcases/modules/${{ github.event.inputs.test_module }}/ -v --alluredir=reports/allure-results --clean-alluredir
          else
            pytest -v --alluredir=reports/allure-results --clean-alluredir
          fi

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate reports/allure-results -o reports/allure-report --clean

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-py${{ matrix.python-version }}
          path: reports/allure-results/
          retention-days: 30

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-py${{ matrix.python-version }}
          path: logs/
          retention-days: 7

      - name: Publish Allure Report
        if: always()
        uses: simple-elf/allure-report-action@v1.1
        with:
          allure_results: reports/allure-results
          allure_history: allure-history
          subfolder: py${{ matrix.python-version }}

  docker-build:
    runs-on: ubuntu-latest
    needs: api-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -f docker/Dockerfile -t security-api-test:latest .

      - name: Run Tests in Docker
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          docker run --rm \
            -e TEST_ENV=test \
            -e BASE_URL=${BASE_URL} \
            -v $(pwd)/reports:/app/reports \
            security-api-test:latest
