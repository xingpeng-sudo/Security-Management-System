name: API Automation Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_module:
        description: '测试模块 (空=全部, 如: coordination)'
        required: false
        default: ''

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure
        run: |
          npm install -g allure-commandline

      - name: Run API Tests
        env:
          TEST_ENV: test
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.test_module }}" ]; then
            pytest testcases/modules/${{ github.event.inputs.test_module }}/ -v \
              --alluredir=reports/allure-results --clean-alluredir
          else
            pytest -v --alluredir=reports/allure-results --clean-alluredir
          fi

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate reports/allure-results -o reports/allure-report --clean

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 30

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: logs/
          retention-days: 7
