name: API Automation Test (Self-Hosted)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_module:
        description: '测试模块 (空=全部, 如: coordination)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  test:
    name: Run API Tests
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      shell: pwsh
      run: |
        python --version
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run API Tests
      shell: pwsh
      env:
        TEST_ENV: test
        BASE_URL: ${{ secrets.BASE_URL }}
      run: |
        $module = "${{ github.event.inputs.test_module }}"
        if ($module) {
          python -m pytest "testcases/modules/$module/" -v --alluredir=reports/allure-results --clean-alluredir
        } else {
          python -m pytest -v --alluredir=reports/allure-results --clean-alluredir
        }
        # 测试失败不阻塞报告生成
        Write-Host "pytest exit code: $LASTEXITCODE"
        exit 0

    - name: Generate Allure Report
      if: always()
      shell: pwsh
      run: |
        $allureCmd = "D:\allure-2.24.1\bin\allure.bat"
        if (Test-Path reports/allure-results) {
          # 恢复历史趋势
          if (Test-Path allure-history/history) {
            Copy-Item allure-history/history reports/allure-results/ -Recurse -Force -ErrorAction SilentlyContinue
          }
          & $allureCmd generate reports/allure-results -o allure-report --clean
          Write-Host "Allure report generated"
        } else {
          Write-Host "No allure-results found"
        }

    - name: Deploy to GitHub Pages
      if: always()
      shell: pwsh
      run: |
        if (-not (Test-Path allure-report)) {
          Write-Host "No report to deploy"
          exit 0
        }

        # 配置 git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # 保留 history 目录用于下次运行
        if (Test-Path allure-report/history) {
          New-Item -ItemType Directory -Force -Path allure-history | Out-Null
          Copy-Item allure-report/history allure-history/ -Recurse -Force -ErrorAction SilentlyContinue
        }

        # 创建/切换到 gh-pages 分支
        git fetch origin gh-pages 2>$null
        if ($LASTEXITCODE -eq 0) {
          git stash
          git checkout gh-pages
          # 清空旧内容
          Get-ChildItem -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        } else {
          git checkout --orphan gh-pages
          git rm -rf . 2>$null
        }

        # 复制报告
        Copy-Item allure-report/* . -Recurse -Force
        New-Item -ItemType File -Path .nojekyll -Force | Out-Null

        # 提交并推送
        git add -A
        $commitResult = git commit -m "Update Allure report [skip ci]" 2>&1
        Write-Host "Commit: $commitResult"

        # 使用 GITHUB_TOKEN 推送
        $repo = "${{ github.repository }}"
        $token = "${{ secrets.GITHUB_TOKEN }}"
        $remoteUrl = "https://x-access-token:$token@github.com/$repo.git"
        git push $remoteUrl gh-pages 2>&1
        Write-Host "Push exit code: $LASTEXITCODE"

        # 切回 main
        git checkout main 2>$null
