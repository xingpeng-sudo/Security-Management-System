# Security Management System CI
# 参考 Steelworks CI 架构：lint -> test -> report -> notify
# Self-Hosted Runner (Windows) | 触发: push/PR 到 main + 手动

name: SMS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_module:
        description: '测试模块 (空=全部, 如: coordination)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ========== 1. 代码质量检查 ==========
  lint:
    name: Code Quality Check
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install lint tools
      shell: powershell
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Check code format with black
      shell: powershell
      run: black --check --diff api testcases utils config conftest.py
      continue-on-error: true

    - name: Check import order with isort
      shell: powershell
      run: isort --check-only --diff api testcases utils config conftest.py
      continue-on-error: true

    - name: Lint with flake8
      shell: powershell
      run: |
        # 只检查严重错误（语法错误、未定义变量等），风格问题不阻断CI
        flake8 api testcases utils config conftest.py --select=E9,F63,F7,F82 --show-source --statistics

  # ========== 2. 测试执行 ==========
  test:
    name: Run API Tests
    runs-on: self-hosted
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      shell: powershell
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run API Tests
      shell: powershell
      env:
        TEST_ENV: test
        BASE_URL: ${{ secrets.BASE_URL }}
      run: |
        $ErrorActionPreference = 'Continue'
        $module = "${{ github.event.inputs.test_module }}"
        if ($module) {
          cmd /c "python -m pytest testcases/modules/$module/ -v --alluredir=reports/allure-results --clean-alluredir 2>&1"
        } else {
          cmd /c "python -m pytest -v --alluredir=reports/allure-results --clean-alluredir 2>&1"
        }
        $testExit = $LASTEXITCODE
        Write-Host "pytest exit code: $testExit"
        # 测试失败不阻断后续步骤，让报告照样生成
        if ($testExit -ne 0) {
          Write-Host "::warning::Tests failed (exit=$testExit), but report generation will continue."
          exit 0
        }

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: reports/allure-results/
        retention-days: 7

  # ========== 3. 生成 & 部署 Allure 报告 ==========
  report:
    name: Generate Allure Report
    runs-on: self-hosted
    needs: test
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download test results
      uses: actions/download-artifact@v4
      with:
        name: test-results
        path: reports/allure-results

    - name: Check downloaded files
      shell: powershell
      run: |
        Write-Host "Allure results:"
        if (Test-Path reports/allure-results) {
          $count = @(Get-ChildItem reports/allure-results/*.json -ErrorAction SilentlyContinue).Count
          Write-Host "Found $count JSON files"
        } else {
          Write-Host "allure-results not found"
        }

    - name: Generate Allure Report
      if: always()
      shell: powershell
      run: |
        $allureCmd = "D:\allure-2.24.1\bin\allure.bat"
        Write-Host "Using Allure: $allureCmd"

        if ((Test-Path reports/allure-results) -and (Get-ChildItem reports/allure-results/*.json -ErrorAction SilentlyContinue)) {
          Write-Host "Found allure-results, generating report..."

          # 创建 allure-history 目录
          New-Item -ItemType Directory -Force -Path allure-history

          # 检查历史趋势
          if (Test-Path allure-history/history) {
            Write-Host "Found existing history, copying to allure-results..."
            Copy-Item allure-history/history reports/allure-results/ -Recurse -Force -ErrorAction SilentlyContinue
          }

          # 生成报告
          & $allureCmd generate reports/allure-results -o allure-report --clean

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Allure report generated successfully"
            # 复制报告到 allure-history（供 peaceiris action 部署）
            Copy-Item allure-report/* allure-history/ -Recurse -Force
            Write-Host "Report copied to allure-history"
          } else {
            Write-Host "Allure generate failed with code $LASTEXITCODE"
            '<html><body><h1>Report Generation Failed</h1></body></html>' | Out-File -FilePath allure-history/index.html
          }
        } else {
          Write-Host "No allure-results found, creating placeholder"
          New-Item -ItemType Directory -Force -Path allure-history
          '<html><body><h1>No Test Results</h1></body></html>' | Out-File -FilePath allure-history/index.html
        }

    - name: Deploy report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history

    - name: Upload report artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-history/

  # ========== 4. 结果通知 ==========
  notify:
    name: Notify Result
    runs-on: self-hosted
    needs: [lint, test]
    if: always()

    steps:
    - name: Summary
      shell: powershell
      run: |
        Write-Host "========== CI Summary =========="
        Write-Host "Lint:  ${{ needs.lint.result }}"
        Write-Host "Test:  ${{ needs.test.result }}"
        Write-Host "================================"
        if ("${{ needs.test.result }}" -eq "failure") {
          Write-Host "::error::Tests FAILED! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        } elseif ("${{ needs.test.result }}" -eq "success") {
          Write-Host "::notice::All tests PASSED!"
        }
